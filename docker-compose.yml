version: "3.9"
services:
  frontend:
    image: node:18
    container_name: ssat-frontend
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
    ports:
      - "5173:5173"
    command: sh -c "cd /app/frontend && npm install --silent >/dev/null 2>&1 || true && npm run start"
  backend:
    image: python:3.11
    container_name: ssat-backend
    working_dir: /app/backend
    volumes:
      - ./backend:/app/backend
    ports:
      - "8000:8000"
    command: sh -c "cd /app/backend && uvicorn main:app --reload --host 0.0.0.0 --port 8000"
  db:
    image: postgres:15
    container_name: ssat-db
    environment:
      POSTGRES_USER: ssat
      POSTGRES_PASSWORD: ssat
      POSTGRES_DB: ssatdb
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
volumes:
  db-data:
